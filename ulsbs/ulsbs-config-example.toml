#
# ulsbs-config-example.toml
#
# Copy this file into your project as ulsbs-config.toml and edit to your needs.
# Everything here is TOML; lines starting with # are comments.
#
# Key naming:
# - You can use dashed-keys (use-container) or snake_case (use_container); they are equivalent.
# - You may also use boolean negations like no-deploy = true (only true is meaningful).
#
# Precedence (lowest -> highest):
#   built-ins < flat config (this root table) < profiles (with inherit + merge-keys) < env vars < CLI flags
#
# Profiles and inheritance:
# - The flat config (this root table) acts as the parent of every profile that does not set inherit-from.
# - If a profile inherits from another profile, its parent already includes flat.
#
# Array merging vs replacement:
# - By default, when a child profile specifies an array key, it REPLACES the parent's array.
# - To MERGE specific arrays for a child profile, list their names in that profile's merge-keys array.
#   * For merged arrays: result = parent + (child items not already present) -> order is preserved, no duplicates.
#   * If a listed key is provided by the child but is not an array (or the parent is not an array), it's an error.
# - merge-keys affects only parent->child profile merging (where the parent may be flat or another profile).
#
# Files and globs:
# - songbooks/common-* accept file paths or glob patterns (?, *). Relative paths are resolved against this file's directory.
# - Duplicates are removed; results are absolute, sorted paths.
# - common-* files don't need to exist when running inside a container; they are only used for deploying on the host.
#
# Special modes:
# - shell: run only an interactive shell and do nothing else.
# - deploy-last: perform only the "deploy last" step and do nothing else.
# - deploy-common: perform only the "deploy common" step and do nothing else.
# - pull: run "git pull --rebase" in the project root before doing anything else.
#   See cli.py for more information on CLI behaviors.
#
# Environment overrides (optional):
# - ULSBS_USE_SYSTEM_TMP_FOR_TEMP=true|false   -> sets use-system-tmp
# - ULSBS_MAX_CONTAINER_MEM_GB=6               -> container memory limit in GiB (also used when deriving max-parallel)
# - ULSBS_MAX_PARALLEL=8                       -> upper bound for parallel jobs (0 or unset = auto)
# - ULSBS_CONTAINER_ENGINE=auto|docker|podman  -> sets container-engine
#
# CLI highlights (override config):
# - Flags like --no-container, --container-rebuild, --shell, --pull, --sequential, --max-parallel,
#   --no-deploy, --no-printouts, --no-coverimage, --no-midi, --no-audio,
#   --no-extrainstr, --no-lyric, -q/--quick, --deploy-last, --deploy-common, --max-log-lines.
# - Passing files on the CLI overrides songbook selection.



# SETTINGS
# ========

# Execution
shell = false                # SPECIAL MODE: only run shell, do nothing else
pull = false                 # SPECIAL: run 'git pull --rebase' before anything else

sequential = false           # if true, behaves like max-parallel = 1
clean-temp = true            # remove temp data after run (alias: keep-temp = true -> clean-temp = false)
# keep-temp = true           # optional alias; if set, it inverts clean-temp (do not set both)

# Features and modes
deploy = true                # default: true
deploy-last = false          # SPECIAL MODE: only run the "deploy last" action
deploy-common = false        # SPECIAL MODE: only run the "deploy common" action
# Optional: override deploy directory (default: <project root>/deploy)
# If set explicitly (here or via --deploy-dir), it must exist and be a directory on the host.
#deploy-dir = "deploy"

create-printouts = true      # default: true
coverimage = true            # default: true
midifiles = true             # default: true
audiofiles = true            # default: true
extrainstrumentbooks = true  # default: true
lyricbooks = true            # default: true
fast-audio-encode = false    # default: false; if true, use faster audio encoding (limiter instead of loudnorm)

# Cover image extraction and modified PNGs
cover-image-height = 1024    # default: 1024; height in pixels for pdftoppm -scale-to-y

# Advanced rules for modified cover PNGs (optional).
# Each modified-cover-png rule controls how to create a widened PNG for
# matching songbook TeX filenames. Rules are evaluated in order; if multiple
# rules match a filename, the LAST matching rule wins.
#
# width-multiplier (required):
#   - Factor applied to the original PNG width to get the widened width.
#   - 0 means "make the image square": width = original height.
# songbook-filenames (optional, default "*"):
#   - Glob matched against the TeX filename only (e.g. "mysongbook*.tex").
#   - Must not contain path components (no "/" or "\\").
# color (optional, default "white"):
#   - ImageMagick color used both for explicit painting and the added border.
# paint-area-rects / paint-area-rect (optional):
#   - One or more rectangles, each as [x1, y1, x2, y2].
#   - Coordinates are floats between 0.0 and 1.0, with bottom-left (0,0)
#     as origin; e.g. [0, 0, 0.5, 0.5] covers the lower-left quarter.
#
# Example rules (commented out by default):
#
# modified-cover-png = [
#   { width-multiplier = 0,   # make square default for all songbooks
#     songbook-filenames = "*.tex",
#   },
#   { width-multiplier = 1.3, # special case for some songbooks
#     songbook-filenames = "unilaiva-astral-transparencia*.tex",
#     color = "white",
#     paint-area-rects = [
#       # Clear a small area at the lower-left corner
#       [0.0, 0.0, 0.18, 0.25],
#     ],
#   },
#   { width-multiplier = 0,   # make square for all other songbooks
#     songbook-filenames = "*.tex",
#   },
# ]

# Files (relative to this TOML file's directory unless absolute). Globs supported (?, *).
# songbooks are the primary inputs and must exist (unless overridden by CLI files).
songbooks = [
  # "songbooks/**/*.toml",
]

# These are only used for deploying (host-side). They may be outside the project.
common-deploy-icons = [
  # "assets/icons/*.png",
]
common-deploy-metadata = [
  # "assets/metadata/*.json",
]
common-deploy-other = [
  # "assets/other/**/*",
]

# Single-file settings (relative to this file; absolute paths not allowed).
# Must exist if given.
mididir_readme_file = "assets/audio-dirs-readme.md"
audiodir_readme_file = "assets/audio-dirs-readme.md"

# Misc
max-log-lines = 20           # default: 20 (clamped to [0,1000])



# PROFILES
# ========

# All profiles will inherit all settings given without a profile (flat).
# The profile specific settings will overwrite these.

[profiles]

# The "default" profile always exists implicitly; it inherits from flat.
# You can override or extend values here if needed.
[profiles.default]
# merge-keys = []           # optional; see below
# Example: turn on sequential just for default profile
# sequential = true


# A base profile that tweaks feature flags; it inherits from flat automatically.
[profiles.base]
create-printouts = false
# Demonstrate negation support (equivalent to deploy = false):
no-deploy = true

# Demonstrate array replacement: if you set songbooks here and do NOT list it in merge-keys
# in a child profile, the child profile's songbooks will REPLACE this list.
songbooks = [
  # "songbooks/base/*.toml",
  # "songbooks/shared/*.toml",
]


# A dev profile that inherits from base; flat is already included in base.
[profiles.dev]
inherit-from = "base"
# Merge only common-deploy-icons from parent; other arrays replace by default
merge-keys = ["common-deploy-icons"]

# Child adds icons; duplicates are ignored, order preserved -> parent + new uniques
common-deploy-icons = [
  # "assets/icons/dev-only.png",
]

# Songbooks here will REPLACE base.songbooks because songbooks is not in merge-keys
songbooks = [
  # "songbooks/dev/*.toml",
]

# Re-enable deploy for dev (overrides base's no-deploy)
deploy = true


# A prod profile that does not inherit from another profile; it inherits from flat.
[profiles.prod]
# Merge only common-deploy-metadata from parent (flat); other arrays replace by default
merge-keys = ["common-deploy-metadata"]

common-deploy-metadata = [
  # "assets/metadata/prod/*.json",
]

# Example replacements
create-printouts = true
lyricbooks = false

# You can also use dashed or snake_case interchangeably for the supported keys.
